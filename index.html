<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>体态评估系统 | Posture Assessment</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- MediaPipe Vision Tasks (WASM) -->
  <script type="importmap">
    {
      "imports": {
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm"
      }
    }
  </script>

  <!-- Application Scripts (order matters: no deps → with deps → orchestrator) -->
  <script src="js/pose_detector.js"></script>
  <script src="js/posture_analyzer.js"></script>
  <script src="js/posture_rules.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/llm_client.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="app-container">

    <!-- ═══ Header ═══ -->
    <header class="app-header">
      <h1 class="app-title">体态评估系统</h1>
      <div class="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">初始化中...</span>
      </div>
    </header>

    <!-- ═══ Camera View ═══ -->
    <div class="camera-view" id="camera-view">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="output"></canvas>

      <!-- View label -->
      <div class="view-label" id="view-label">侧面观</div>

      <!-- HUD badges -->
      <div class="hud-overlay">
        <div class="hud-badge">
          <div class="label">体态分</div>
          <div class="value" id="score-badge">--</div>
        </div>
        <div class="hud-badge">
          <div class="label">力线</div>
          <div class="value" id="fl-badge">--</div>
        </div>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast"></div>
    </div>

    <!-- ═══ Controls Bar ═══ -->
    <div class="controls-bar">
      <!-- View toggle -->
      <div class="view-toggle">
        <button class="btn active" id="btn-view-sagittal">侧面观</button>
        <button class="btn" id="btn-view-frontal">正面观</button>
      </div>

      <button class="btn" id="btn-start" title="开始/暂停分析">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        暂停分析
      </button>

      <!-- Capture button (large center) -->
      <button class="btn btn-capture" id="btn-capture" title="拍照评估 (空格键)">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      </button>

      <button class="btn btn-icon" id="btn-switch-camera" title="切换摄像头">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-3l-2-3H9L7 7H4c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2z"/><circle cx="12" cy="13" r="3"/></svg>
      </button>

      <button class="btn btn-sm" id="btn-llm-settings" title="LLM设置">⚙</button>
    </div>

    <!-- ═══ Report Panel (Slide-up) ═══ -->
    <div class="report-panel" id="report-panel">
      <div class="panel-header">
        <h3>体态评估报告</h3>
        <button class="btn btn-sm" id="btn-report-close">✕ 关闭</button>
      </div>
      <div class="panel-body" id="report-content">
        <!-- Dynamically filled -->
      </div>
      <div class="panel-body" style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0;">
        <!-- LLM Section -->
        <button class="btn btn-primary" id="btn-llm-generate" style="width:100%; margin-bottom: 12px;">
          AI 生成详细报告
        </button>
        <div class="llm-output" id="llm-output" style="display:none;">
          <div class="llm-output-header">
            <span>AI 分析报告</span>
            <button class="btn btn-sm" id="btn-llm-close">✕</button>
          </div>
          <div id="llm-progress-text" class="llm-progress-text"></div>
          <progress id="llm-progress-bar" class="llm-progress-bar" value="0" max="1"></progress>
          <div class="llm-output-text" id="llm-output-text"></div>
        </div>
      </div>
    </div>

    <!-- ═══ LLM Settings Panel ═══ -->
    <div class="settings-panel" id="llm-settings-panel">
      <h4>AI 报告设置</h4>

      <div class="form-group">
        <label>LLM 后端</label>
        <select id="llm-backend" style="width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#e0e0e0;font-size:14px;font-family:var(--font-sans);outline:none;">
          <option value="ollama">Ollama (电脑端)</option>
          <option value="webllm">WebLLM (手机/浏览器内置)</option>
        </select>
      </div>

      <div id="llm-endpoint-group" class="form-group">
        <label>Ollama 服务地址</label>
        <input type="text" id="llm-endpoint" value="http://localhost:11434/api/generate">
      </div>

      <div id="llm-ollama-model-group" class="form-group">
        <label>Ollama 模型</label>
        <input type="text" id="llm-ollama-model" value="qwen2.5:3b">
      </div>

      <div id="llm-webllm-group" class="form-group" style="display:none;">
        <label>浏览器内置模型（WebGPU）</label>
        <select id="llm-webllm-model" style="width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#e0e0e0;font-size:14px;font-family:var(--font-sans);outline:none;">
        </select>
        <p style="font-size:10px;color:#888;margin-top:6px;">首次使用需下载模型 (~1-2GB)，之后缓存到浏览器。需支持 WebGPU 的浏览器。</p>
      </div>

      <p style="font-size:11px;color:#888;margin-bottom:12px;">
        Ollama 安装: <a href="https://ollama.com" target="_blank" style="color:var(--accent);">ollama.com</a> · 模型: <code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:3px;">ollama pull qwen2.5:3b</code>
      </p>
      <button class="btn btn-primary" id="btn-llm-settings-save" style="width:100%;">保存设置</button>
    </div>

  </div>

  <!-- Keyboard shortcut hint (auto-hidden on mobile) -->
  <script>
    // Show keyboard shortcut hint only on desktop
    if (window.innerWidth >= 768) {
      const hint = document.createElement("div");
      hint.style.cssText = "position:fixed;bottom:100px;right:12px;background:rgba(0,0,0,0.6);color:#888;padding:6px 10px;border-radius:6px;font-size:10px;z-index:50;pointer-events:none;";
      hint.textContent = "空格:拍照 · V:切换视角";
      document.body.appendChild(hint);
      setTimeout(() => { hint.style.opacity = "0"; hint.style.transition = "opacity 2s"; }, 5000);
    }
  </script>
</body>
</html>
